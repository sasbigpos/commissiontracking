<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sales Commission Tracker</title>

<!-- Firebase v10 (modular via compat shim for CDN) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #f5f6fa; --surface: #ffffff; --border: #e2e5ed;
    --primary: #2563eb; --primary-light: #eff4ff;
    --danger: #dc2626; --danger-light: #fef2f2;
    --warn: #d97706; --warn-light: #fffbeb;
    --success: #16a34a;
    --text: #111827; --text-2: #4b5563; --text-3: #9ca3af;
    --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  h1,h2,h3,h4 { margin:0 0 .5rem; } p { margin:0; }
  input,select,textarea { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; color:var(--text); background:#fff; font-family:inherit; outline:none; transition:border-color .15s; }
  input:focus,select:focus,textarea:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
  input:disabled,select:disabled { background:var(--bg); color:var(--text-2); }
  label { display:block; font-size:12px; font-weight:500; color:var(--text-2); margin-bottom:4px; }
  textarea { resize:vertical; min-height:60px; }
  button { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--text); font-size:13px; font-family:inherit; cursor:pointer; transition:background .12s,border-color .12s; }
  button:hover { background:var(--bg); }
  button.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
  button.primary:hover { background:#1d4ed8; }
  button.icon { padding:5px 8px; }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  .edit-btn { color:var(--primary); border-color:transparent; background:none; }
  .edit-btn:hover { background:var(--primary-light); border-color:#c7d9fd; }
  .delete-btn { color:var(--danger); border-color:transparent; background:none; }
  .delete-btn:hover { background:var(--danger-light); border-color:#fca5a5; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; box-shadow:var(--shadow); }
  .grid { display:grid; gap:12px; }
  .g2 { grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); }
  .g3 { grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { text-align:left; padding:8px 10px; font-weight:600; font-size:12px; color:var(--text-2); border-bottom:2px solid var(--border); white-space:nowrap; background:var(--bg); }
  tbody td { padding:7px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:#f9fafb; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .badge-green { background:#dcfce7; color:#15803d; }
  .badge-yellow { background:#fef9c3; color:#a16207; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; }
  .stat-card .slabel { font-size:12px; color:var(--text-2); margin-bottom:4px; }
  .stat-card .svalue { font-size:20px; font-weight:700; color:var(--text); }
  .stat-card-blue { border-top:3px solid var(--primary); }
  .stat-card-blue .slabel { color:var(--primary); font-weight:600; }
  .svalue-blue { color:var(--primary) !important; }
  .stat-card-green { border-top:3px solid var(--success); }
  .stat-card-green .slabel { color:var(--success); font-weight:600; }
  .svalue-green { color:var(--success) !important; }
  .stat-card .svalue { font-size:22px; font-weight:700; color:var(--text); }
  .tab-bar { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:4px; margin-bottom:1.25rem; flex-wrap:wrap; }
  .tab { padding:7px 14px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text-2); border:none; background:none; transition:background .12s,color .12s; }
  .tab:hover { background:var(--bg); color:var(--text); }
  .tab.active { background:var(--primary); color:#fff; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .topbar h1 { font-size:16px; font-weight:700; }
  .main { max-width:1500px; margin:0 auto; padding:1.25rem 1.5rem; }
  .filter-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem; }
  .filter-row > div { min-width:140px; }
  .commission-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; box-shadow:var(--shadow); }
  .chead { background:var(--primary-light); border-bottom:1px solid #c7d9fd; padding:.85rem 1.25rem; display:flex; justify-content:space-between; align-items:center; }
  .chead h3 { font-size:15px; color:var(--primary); margin:0; }
  .commission-row { display:flex; gap:12px; align-items:center; padding:10px 1.25rem; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .rlabel { flex:1; min-width:200px; color:var(--text-2); font-size:13px; }
  .rval { font-size:13px; min-width:120px; text-align:right; }
  .rpct { font-size:12px; min-width:44px; text-align:center; background:var(--bg); border-radius:4px; padding:2px 6px; color:var(--text-2); border:1px solid var(--border); }
  .rcomm { font-size:14px; font-weight:600; min-width:120px; text-align:right; color:var(--success); }
  .rcomm.zero { color:var(--text-3); }
  .commission-total { display:flex; justify-content:space-between; align-items:center; padding:12px 1.25rem; background:var(--bg); border-top:2px solid var(--border); }
  .commission-total span:last-child { font-size:18px; font-weight:700; color:var(--primary); }
  .total-payout { display:flex; justify-content:space-between; align-items:center; background:var(--primary); color:#fff; border-radius:var(--radius); padding:1rem 1.25rem; font-weight:600; font-size:15px; margin-top:8px; }
  .login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; background:var(--bg); }
  .login-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem; width:100%; max-width:380px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
  .hint-box { font-size:12px; color:var(--text-3); background:var(--bg); border-radius:6px; padding:10px; margin-top:1rem; }
  .err { color:var(--danger); font-size:12px; margin-top:6px; padding:8px 10px; background:var(--danger-light); border-radius:6px; }
  .warn-text { color:var(--warn); font-size:12px; margin-top:4px; }
  .form-group { margin-bottom:12px; }
  .ovx { overflow-x:auto; }
  .empty { padding:2rem; text-align:center; color:var(--text-3); }
  .pill { display:inline-block; border-radius:999px; padding:1px 10px; font-size:11px; font-weight:600; }
  .pill-gray { background:var(--bg); color:var(--text-2); border:1px solid var(--border); }
  .tier-note { font-size:12px; color:var(--text-2); margin-top:10px; }
  .tier-note-ok { color:var(--success); }
  .tier-card-head { display:flex; align-items:flex-start; gap:12px; margin-bottom:1rem; }
  .tier-icon { width:38px; height:38px; min-width:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .tier-icon-blue { background:var(--primary-light); }
  .tier-icon-green { background:#dcfce7; }
  .tier-table { table-layout:fixed; width:100%; }
  .tier-table thead th { background:transparent; border-bottom:1px solid var(--border); }
  .tier-table td, .tier-table th { word-break:break-word; overflow-wrap:break-word; }
  .tier-table td:last-child, .tier-table th:last-child { width:70px; }
  .tier-num { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:6px; background:var(--bg); font-weight:600; font-size:12px; color:var(--text-2); }
  .rate-badge { display:inline-block; padding:3px 8px; border-radius:6px; font-weight:700; font-size:12px; white-space:nowrap; }
  .rate-blue-1 { background:#dbeafe; color:#1d4ed8; }
  .rate-blue-2 { background:#bfdbfe; color:#1e40af; }
  .rate-blue-3 { background:#93c5fd; color:#1e3a8a; }
  .rate-green-1 { background:#dcfce7; color:#15803d; }
  .rate-green-2 { background:#bbf7d0; color:#166534; }
  .rate-green-3 { background:#86efac; color:#14532d; }
  .rate-gray { background:var(--bg); color:var(--text-2); border:1px solid var(--border); }
  .calc-block { background:#fff; border:1px solid #c7d9fd; border-radius:8px; padding:12px 14px; }
  .calc-label { font-size:12px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
  .loading-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text-2); font-size:14px; }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .config-banner { background:var(--warn-light); border:1px solid #fcd34d; border-radius:var(--radius); padding:1.25rem; margin-bottom:1.25rem; }
  .config-banner h3 { color:var(--warn); margin-bottom:8px; }
  .config-banner code { background:#fff; padding:2px 6px; border-radius:4px; font-size:12px; border:1px solid var(--border); }
  .sync-indicator { font-size:11px; color:var(--text-3); display:flex; align-items:center; gap:4px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--success); }
  .sync-dot.saving { background:var(--warn); animation:pulse .8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .team-card { border-left:4px solid var(--primary); }
  .team-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap; gap:8px; }
  .team-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; background:var(--primary-light); color:var(--primary); padding:3px 8px; border-radius:999px; }
  .team-member-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .team-member-row:last-child { border-bottom:none; }
  .override-row { background:#f0fdf4; border-top:2px solid var(--success); padding:10px 1.25rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .override-label { font-size:13px; color:var(--success); font-weight:600; }
  .override-amount { font-size:16px; font-weight:700; color:var(--success); }
  .mgr-badge { font-size:11px; background:#fef9c3; color:#a16207; border:1px solid #fde68a; padding:2px 7px; border-radius:999px; font-weight:600; margin-left:6px; }
  @media(max-width:600px){ .topbar{padding:.75rem 1rem;} .main{padding:1rem;} .tab{padding:6px 10px;font-size:12px;} }
  /* Analytics */
  .analytics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); gap:16px; margin-bottom:20px; }
  .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; box-shadow:var(--shadow); }
  .chart-card h4 { margin:0 0 4px; font-size:14px; font-weight:600; }
  .chart-card .chart-sub { font-size:12px; color:var(--text-3); margin-bottom:14px; }
  .chart-wrap { position:relative; height:260px; }
  .chart-wrap-sm { position:relative; height:220px; }
  .seg-toggle { display:flex; gap:4px; background:var(--bg); border-radius:6px; padding:3px; margin-bottom:12px; width:fit-content; }
  .seg-btn { padding:5px 12px; border-radius:4px; font-size:12px; font-weight:500; border:none; cursor:pointer; background:none; color:var(--text-2); transition:background .12s,color .12s; }
  .seg-btn.active { background:var(--surface); color:var(--primary); box-shadow:0 1px 3px rgba(0,0,0,.1); }
  .product-table { width:100%; border-collapse:collapse; font-size:12px; }
  .product-table th { text-align:left; padding:6px 8px; font-weight:600; color:var(--text-2); border-bottom:2px solid var(--border); background:var(--bg); }
  .product-table td { padding:6px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
  .product-table tr:last-child td { border-bottom:none; }
  .product-table tr:hover td { background:#f9fafb; }
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
  .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; text-align:center; }
  .kpi-card .kpi-val { font-size:26px; font-weight:700; }
  .kpi-card .kpi-lbl { font-size:11px; color:var(--text-3); margin-top:2px; text-transform:uppercase; letter-spacing:.4px; }
  .kpi-blue { border-top:3px solid var(--primary); } .kpi-blue .kpi-val { color:var(--primary); }
  .kpi-green { border-top:3px solid var(--success); } .kpi-green .kpi-val { color:var(--success); }
  .kpi-amber { border-top:3px solid #d97706; } .kpi-amber .kpi-val { color:#d97706; }
  .kpi-purple { border-top:3px solid #7c3aed; } .kpi-purple .kpi-val { color:#7c3aed; }
  .bar-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; font-size:12px; }
  .bar-row .bar-label { min-width:90px; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-2); }
  .bar-row .bar-track { flex:1; height:14px; background:var(--bg); border-radius:4px; overflow:hidden; }
  .bar-row .bar-fill { height:100%; border-radius:4px; transition:width .4s; }
  .bar-row .bar-val { min-width:78px; text-align:right; font-size:11px; color:var(--text-2); }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// FIREBASE CONFIGURATION
// Replace the values below with your own Firebase project config.
// You get these from: Firebase Console → Project Settings → Your Apps → Web App
// ─────────────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC1IUIIKGr9x5GEh6AuQPrV_4VroE6VbyU",
  authDomain:        "commissiontracking-1ac0a.firebaseapp.com",
  projectId:         "commissiontracking-1ac0a",
  storageBucket:     "commissiontracking-1ac0a.firebasestorage.app",
  messagingSenderId: "306865619840",
  appId:             "1:306865619840:web:0c235bda808782394f7765"
};
// ─────────────────────────────────────────────────────────────────────────────

const IS_CONFIGURED = !FIREBASE_CONFIG.apiKey.startsWith("YOUR_");

const { createElement: h, useState, useEffect, useMemo, useCallback } = React;

// ── Commission tier constants ─────────────────────────────────────────────────
const BRANCHES = ["HQ","SWK","JHR","SBH","KL","PG","PHG"];
const DEFAULT_SALES = ["Melvilline","Levin","Azfar","Jaery","Zani","Hong","Allan"];

const NEWSUB_TIERS = [
  { min:2256,     max:11280,    pct:0.08, label:"RM 2,256 – RM 11,280" },
  { min:11281,    max:20304,    pct:0.12, label:"RM 11,281 – RM 20,304" },
  { min:20304.01, max:Infinity, pct:0.18, label:"> RM 20,304" },
];
const RENEWAL_RATE_TIERS = [
  { minNewSub:20000.01, pct:0.12, label:"> RM 20,000 new sub achieved" },
  { minNewSub:14000.01, pct:0.09, label:"> RM 14,000 new sub achieved" },
  { minNewSub:8000.01,  pct:0.06, label:"> RM 8,000 new sub achieved"  },
];
const RENEWAL_BASE_PCT = 0.03;

function getRenewalRate(newSubSw) {
  for (const t of RENEWAL_RATE_TIERS) if (newSubSw >= t.minNewSub) return t;
  return null;
}
function getTier(v, tiers) {
  for (const t of tiers) if (v >= t.min && v <= t.max) return t;
  return null;
}
function fmt(n) { return "RM"+(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pctStr(n) { return (n*100).toFixed(0)+"%"; }
function num(v) { return Number(v)||0; }

const emptyInvoice = () => ({
  date:"", invoiceNo:"", customer:"",
  hardwareValue:"", softwareValue:"",
  softwareCase:"", newSub:"0", renewal:"0",
  branch:BRANCHES[0], salesPerson:"", status:"Paid", remark:""
});

// ── Firebase / Firestore helpers ──────────────────────────────────────────────
let db = null;

function initFirebase() {
  if (!IS_CONFIGURED) return false;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    return true;
  } catch(e) {
    console.error("Firebase init error:", e);
    return false;
  }
}

// Collections: "users", "invoices", "settings" (doc: "salesPeople")
async function fsGetAll(collection) {
  const snap = await db.collection(collection).get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function fsSet(collection, id, data) {
  await db.collection(collection).doc(id).set(data);
}
async function fsAdd(collection, data) {
  const ref = await db.collection(collection).add(data);
  return ref.id;
}
async function fsUpdate(collection, id, data) {
  await db.collection(collection).doc(id).update(data);
}
async function fsDelete(collection, id) {
  await db.collection(collection).doc(id).delete();
}

// ── Default users (seeded into Firestore on first run) ───────────────────────
const DEFAULT_USERS = [
  { username:"admin",      password:"admin123",      role:"admin", name:"Admin"      },
  ...DEFAULT_SALES.map(n=>({ username:n.toLowerCase(), password:n.toLowerCase()+"123", role:"sales", name:n }))
];

// ── App ───────────────────────────────────────────────────────────────────────
// ── PieChart: pure SVG, no dependencies ──────────────────────────────────────
const PIE_COLORS = [
  "#2563eb","#16a34a","#d97706","#7c3aed","#db2777","#0891b2",
  "#65a30d","#ea580c","#4f46e5","#0d9488","#b45309","#6d28d9",
  "#be123c","#0369a1","#15803d","#c2410c"
];
function svgArc(cx, cy, r, startAngle, endAngle) {
  const s = { x: cx + r * Math.cos(startAngle), y: cy + r * Math.sin(startAngle) };
  const e = { x: cx + r * Math.cos(endAngle),   y: cy + r * Math.sin(endAngle)   };
  const large = endAngle - startAngle > Math.PI ? 1 : 0;
  return "M "+cx+" "+cy+" L "+s.x+" "+s.y+" A "+r+" "+r+" 0 "+large+" 1 "+e.x+" "+e.y+" Z";
}
function PieChart({ data, title, subtitle }) {
  const [tooltip, setTooltip] = React.useState(null);
  if (!data || data.length === 0) return h("div",{className:"chart-card"},
    h("h4",null,title), h("div",{className:"chart-sub"},subtitle),
    h("p",{style:{color:"var(--text-3)",fontSize:12,padding:"2rem 0",textAlign:"center"}},"No data for selected period")
  );
  const total = data.reduce((s,d)=>s+d.value, 0);
  if (total === 0) return h("div",{className:"chart-card"},
    h("h4",null,title), h("div",{className:"chart-sub"},subtitle),
    h("p",{style:{color:"var(--text-3)",fontSize:12,padding:"2rem 0",textAlign:"center"}},"All values are zero")
  );
  const cx=130, cy=130, r=110;
  let angle = -Math.PI/2;
  const slices = data.map((d,i)=>{
    const sweep = (d.value/total)*2*Math.PI;
    const path = svgArc(cx,cy,r,angle,angle+sweep);
    const midA = angle + sweep/2;
    const slice = { path, color:PIE_COLORS[i%PIE_COLORS.length], label:d.label, value:d.value, pct:(d.value/total*100).toFixed(1), midA };
    angle += sweep;
    return slice;
  });
  return h("div",{className:"chart-card"},
    h("h4",null,title),
    h("div",{className:"chart-sub"},subtitle),
    h("div",{style:{display:"flex",flexWrap:"wrap",gap:16,alignItems:"flex-start"}},
      h("div",{style:{position:"relative",flexShrink:0}},
        h("svg",{width:260,height:260,viewBox:"0 0 260 260"},
          slices.map((s,i)=>h("path",{
            key:i, d:s.path, fill:s.color, stroke:"#fff", strokeWidth:2,
            style:{cursor:"pointer",opacity:tooltip&&tooltip.i===i?0.8:1},
            onMouseEnter:()=>setTooltip({i,...s}),
            onMouseLeave:()=>setTooltip(null)
          }))
        ),
        tooltip&&h("div",{style:{
          position:"absolute",top:8,left:270,background:"#1f2937",color:"#fff",
          borderRadius:6,padding:"8px 12px",fontSize:11,pointerEvents:"none",
          minWidth:140,zIndex:10,boxShadow:"0 2px 8px rgba(0,0,0,.3)"
        }},
          h("div",{style:{fontWeight:600,marginBottom:3}},tooltip.label),
          h("div",null,"RM"+tooltip.value.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})),
          h("div",{style:{color:"#9ca3af"}},tooltip.pct+"%")
        )
      ),
      h("div",{style:{flex:1,minWidth:120,maxHeight:260,overflowY:"auto"}},
        slices.map((s,i)=>h("div",{key:i,style:{
          display:"flex",alignItems:"center",gap:6,marginBottom:5,fontSize:11,
          cursor:"pointer",opacity:tooltip&&tooltip.i===i?0.7:1
        },
        onMouseEnter:()=>setTooltip({i,...s}),
        onMouseLeave:()=>setTooltip(null)},
          h("div",{style:{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}),
          h("span",{style:{color:"var(--text-2)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},s.label),
          h("span",{style:{color:"var(--text-3)",flexShrink:0}},s.pct+"%")
        ))
      )
    )
  );
}

// ── HBar: horizontal bar chart ────────────────────────────────────────────────
function HBar({ data, color }) {
  if (!data||data.length===0) return h("p",{style:{color:"var(--text-3)",fontSize:12}},"No data");
  const max = Math.max(...data.map(d=>d.value), 1);
  const COLORS = ["#2563eb","#16a34a","#d97706","#7c3aed","#db2777","#0891b2","#65a30d","#ea580c","#4f46e5"];
  return h("div",null,
    data.map((d,i)=>h("div",{key:d.label,className:"bar-row"},
      h("span",{className:"bar-label",title:d.label},d.label),
      h("div",{className:"bar-track"},
        h("div",{className:"bar-fill",style:{width:(d.value/max*100)+"%",background:color||COLORS[i%COLORS.length]}})
      ),
      h("span",{className:"bar-val"},"RM"+d.value.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}))
    ))
  );
}

function App() {
  const [fbReady,      setFbReady]      = useState(false);
  const [fbError,      setFbError]      = useState("");
  const [appLoading,   setAppLoading]   = useState(true);
  const [saving,       setSaving]       = useState(false);

  const [users,        setUsers]        = useState([]);
  const [invoices,     setInvoices]     = useState([]);
  const [salesPeople,  setSalesPeople]  = useState(DEFAULT_SALES);

  const [currentUser,  setCurrentUser]  = useState(null);
  const [loginForm,    setLoginForm]    = useState({username:"",password:""});
  const [loginError,   setLoginError]   = useState("");
  const [loginLoading, setLoginLoading] = useState(false);

  const [tab,          setTab]          = useState("invoices");
  const [form,         setForm]         = useState(emptyInvoice());
  const [editingId,    setEditingId]    = useState(null);
  const [filterMonth,  setFilterMonth]  = useState("");
  const [filterPerson, setFilterPerson] = useState("");
  const [reportMonth,  setReportMonth]  = useState("");
  const [reportPerson, setReportPerson] = useState("");
  const [teams,        setTeams]        = useState([]);
  const [anaMonth,     setAnaMonth]     = useState("");
  const [newSalesName, setNewSalesName] = useState("");
  const [newUserForm,  setNewUserForm]  = useState({username:"",password:"",name:""});
  const [teamForm,     setTeamForm]     = useState({name:"",managerName:"",overridePct:"5",members:[]});
  const [editingTeamId,setEditingTeamId]= useState(null);
  const [teamMemberInput,setTeamMemberInput]= useState("");
  const [showTeamForm,  setShowTeamForm]  = useState(false);

  // ── Init Firebase & load data ───────────────────────────────────────────────
  useEffect(()=>{
    if (!IS_CONFIGURED) { setAppLoading(false); return; }
    const ok = initFirebase();
    if (!ok) { setFbError("Firebase initialisation failed. Check your config."); setAppLoading(false); return; }
    setFbReady(true);
    loadAll();
  }, []);

  async function loadAll() {
    try {
      // Load users; seed defaults if empty
      let usersData = await fsGetAll("users");
      if (usersData.length === 0) {
        for (const u of DEFAULT_USERS) {
          await fsSet("users", u.username, u);
        }
        usersData = DEFAULT_USERS.map(u=>({...u, id:u.username}));
      }
      setUsers(usersData);

      // Load invoices
      const invoicesData = await fsGetAll("invoices");
      setInvoices(invoicesData);

      // Load sales people setting
      try {
        const snap = await db.collection("settings").doc("salesPeople").get();
        if (snap.exists) setSalesPeople(snap.data().list || DEFAULT_SALES);
        else await db.collection("settings").doc("salesPeople").set({ list: DEFAULT_SALES });
      } catch(e) {}

      // Load teams
      try {
        const teamsSnap = await fsGetAll("teams");
        setTeams(teamsSnap);
      } catch(e) {}

    } catch(e) {
      setFbError("Failed to load data from Firestore: " + e.message);
    }
    setAppLoading(false);
  }

  // ── Auth ────────────────────────────────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    setLoginLoading(true); setLoginError("");
    try {
      const uname = loginForm.username.trim().toLowerCase();
      const snap = await db.collection("users").doc(uname).get();
      if (!snap.exists || snap.data().password !== loginForm.password) {
        setLoginError("Invalid username or password."); setLoginLoading(false); return;
      }
      const u = snap.data();
      setCurrentUser(u);
      if (u.role==="sales"||u.role==="manager") { setForm(f=>({...f,salesPerson:u.name})); setReportPerson(u.name); }
    } catch(e) {
      setLoginError("Login error: "+e.message);
    }
    setLoginLoading(false);
  }

  function logout() { setCurrentUser(null); setLoginForm({username:"",password:""}); setTab("invoices"); }

  const isAdmin = currentUser && currentUser.role==="admin";

  // Manager: a sales person who is assigned as manager of a team
  const myTeam = useMemo(()=>{
    if (!currentUser) return null;
    return teams.find(t=>t.managerName===currentUser.name) || null;
  },[teams, currentUser]);
  const isManager = !!myTeam;
  // Team member names (for manager's invoice filter & commission view)
  const myTeamMembers = useMemo(()=>myTeam ? (myTeam.members||[]) : [], [myTeam]);
  // All names the manager can see invoices for: own + team members
  const managerScope = useMemo(()=>{
    if (!isManager || !currentUser) return [];
    return [currentUser.name, ...myTeamMembers];
  },[isManager, currentUser, myTeamMembers]);

  // ── Invoice CRUD ─────────────────────────────────────────────────────────────
  function resetForm() {
    setForm({...emptyInvoice(), salesPerson:(currentUser&&(currentUser.role==="sales"||currentUser.role==="manager"))?currentUser.name:""});
    setEditingId(null);
  }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!form.date||!form.invoiceNo||!form.customer||!form.salesPerson) {
      alert("Please fill in Date, Invoice No, Customer and Sales Person."); return;
    }
    const cleaned = {
      ...form,
      hardwareValue: num(form.hardwareValue),
      softwareValue: num(form.softwareValue),
      softwareCase:  num(form.softwareCase),
      newSub:  num(form.newSub),
      renewal: num(form.renewal),
      updatedAt: new Date().toISOString(),
    };
    setSaving(true);
    try {
      if (editingId) {
        await fsUpdate("invoices", editingId, cleaned);
        setInvoices(prev=>prev.map(i=>i.id===editingId?{...cleaned,id:editingId}:i));
      } else {
        cleaned.createdAt = new Date().toISOString();
        const newId = await fsAdd("invoices", cleaned);
        setInvoices(prev=>[...prev, {...cleaned, id:newId}]);
      }
      resetForm();
    } catch(e) { alert("Save failed: "+e.message); }
    setSaving(false);
  }

  async function deleteInvoice(id) {
    if (!confirm("Delete this invoice record?")) return;
    setSaving(true);
    try {
      await fsDelete("invoices", id);
      setInvoices(prev=>prev.filter(i=>i.id!==id));
      if (editingId===id) resetForm();
    } catch(e) { alert("Delete failed: "+e.message); }
    setSaving(false);
  }

  // ── Settings ─────────────────────────────────────────────────────────────────
  async function saveSalesPeople(next) {
    setSalesPeople(next);
    try { await db.collection("settings").doc("salesPeople").set({ list: next }); } catch(e) {}
  }

  async function addSalesPerson() {
    const n = newSalesName.trim();
    if (!n || salesPeople.includes(n)) return;
    await saveSalesPeople([...salesPeople, n]);
    setNewSalesName("");
  }

  async function removeSalesPerson(name) {
    if (!confirm('Remove "'+name+'" from sales person list?')) return;
    await saveSalesPeople(salesPeople.filter(s=>s!==name));
  }

  async function addUser() {
    if (!newUserForm.username.trim()||!newUserForm.password.trim()||!newUserForm.name.trim()) {
      alert("Fill in all fields."); return;
    }
    const uname = newUserForm.username.trim().toLowerCase();
    if (users.some(u=>u.username.toLowerCase()===uname)) { alert("Username already exists."); return; }
    const newUser = { username:uname, password:newUserForm.password.trim(), role:"sales", name:newUserForm.name.trim() };
    setSaving(true);
    try {
      await fsSet("users", uname, newUser);
      setUsers(prev=>[...prev, {...newUser, id:uname}]);
      if (!salesPeople.includes(newUser.name)) await saveSalesPeople([...salesPeople, newUser.name]);
      setNewUserForm({username:"",password:"",name:""});
    } catch(e) { alert("Failed to add user: "+e.message); }
    setSaving(false);
  }

  async function removeUser(username) {
    if (username==="admin") return;
    if (!confirm('Remove user "'+username+'"?')) return;
    setSaving(true);
    try {
      await fsDelete("users", username);
      setUsers(prev=>prev.filter(u=>u.username!==username));
    } catch(e) { alert("Failed to remove user: "+e.message); }
    setSaving(false);
  }

  // ── Derived data ──────────────────────────────────────────────────────────────
  const visibleInvoices = useMemo(()=>{
    if (!currentUser) return [];
    if (isAdmin) return invoices;
    if (isManager) return invoices.filter(i=>managerScope.includes(i.salesPerson));
    return invoices.filter(i=>i.salesPerson===currentUser.name);
  }, [invoices, currentUser, isAdmin, isManager, managerScope]);

  const filteredInvoices = useMemo(()=>visibleInvoices.filter(i=>{
    if (filterMonth && i.date && i.date.slice(0,7)!==filterMonth) return false;
    if ((isAdmin||isManager) && filterPerson && i.salesPerson!==filterPerson) return false;
    return true;
  }), [visibleInvoices, filterMonth, filterPerson, isAdmin, isManager]);

  const totals = useMemo(()=>filteredInvoices.reduce((acc,i)=>{
    const sw = num(i.softwareValue);
    const isNew = num(i.newSub) > 0;
    const isRen = num(i.renewal) > 0;
    return {
      hardware:  acc.hardware  + num(i.hardwareValue),
      software:  acc.software  + sw,
      total:     acc.total     + num(i.hardwareValue) + sw,
      cases:     acc.cases     + num(i.softwareCase),
      newSubSw:  acc.newSubSw  + (isNew ? sw : 0),
      renewalSw: acc.renewalSw + (isRen && !isNew ? sw : 0),
    };
  },{hardware:0,software:0,total:0,cases:0,newSubSw:0,renewalSw:0}), [filteredInvoices]);

  const reportData = useMemo(()=>{
    if (!currentUser) return [];
    let pool = invoices;
    if (isAdmin) {
      if (reportPerson) pool = pool.filter(i=>i.salesPerson===reportPerson);
    } else if (isManager) {
      pool = pool.filter(i=>myTeamMembers.includes(i.salesPerson));
      if (reportPerson) pool = pool.filter(i=>i.salesPerson===reportPerson);
    } else {
      pool = pool.filter(i=>i.salesPerson===currentUser.name);
    }
    if (reportMonth) pool = pool.filter(i=>i.date&&i.date.slice(0,7)===reportMonth);

    const byPerson = {};
    pool.forEach(i=>{
      const sp = i.salesPerson||"Unassigned";
      if (!byPerson[sp]) byPerson[sp]={renewalSw:0,newSubSw:0,count:0};
      const sw = num(i.softwareValue);
      if (num(i.newSub)>0) byPerson[sp].newSubSw += sw;
      else if (num(i.renewal)>0) byPerson[sp].renewalSw += sw;
      byPerson[sp].count++;
    });

    return Object.entries(byPerson).map(([name,d])=>{
      const nTier   = getTier(d.newSubSw, NEWSUB_TIERS);
      const nPct    = nTier ? nTier.pct : 0;
      const nComm   = d.newSubSw * nPct;
      const rRateTier = getRenewalRate(d.newSubSw);
      const rPct    = rRateTier ? rRateTier.pct : RENEWAL_BASE_PCT;
      const rComm   = d.renewalSw * rPct;
      return {name,...d,rPct,nPct,rComm,nComm,nTier,rRateTier,totalCommission:rComm+nComm};
    }).sort((a,b)=>a.name.localeCompare(b.name));
  }, [invoices, currentUser, reportMonth, reportPerson, isAdmin, isManager, myTeamMembers]);

  // ── Helper: compute commission for a set of invoices grouped by person ──────
  function calcTeamCommission(pool) {
    const byPerson = {};
    pool.forEach(i=>{
      const sp = i.salesPerson||"Unassigned";
      if (!byPerson[sp]) byPerson[sp]={renewalSw:0,newSubSw:0};
      const sw = num(i.softwareValue);
      if (num(i.newSub)>0) byPerson[sp].newSubSw += sw;
      else if (num(i.renewal)>0) byPerson[sp].renewalSw += sw;
    });
    let total = 0;
    Object.values(byPerson).forEach(d=>{
      const nPct = (getTier(d.newSubSw,NEWSUB_TIERS)||{pct:0}).pct;
      const rPct = (getRenewalRate(d.newSubSw)||{pct:RENEWAL_BASE_PCT}).pct;
      total += d.newSubSw*nPct + d.renewalSw*rPct;
    });
    return total;
  }

  // ── Manager override commission ─────────────────────────────────────────────
  // For logged-in manager: their own team override based on reportMonth filter
  const managerOverride = useMemo(()=>{
    if (!isManager || !myTeam) return null;
    let pool = invoices.filter(i=>myTeamMembers.includes(i.salesPerson));
    if (reportMonth) pool = pool.filter(i=>i.date&&i.date.slice(0,7)===reportMonth);
    const teamTotalCommission = calcTeamCommission(pool);
    const pct = num(myTeam.overridePct)/100;
    return { teamName:myTeam.name, teamTotalCommission, overridePct:pct, overrideAmt:teamTotalCommission*pct };
  },[isManager, myTeam, myTeamMembers, invoices, reportMonth]);

  // ── All teams' override commissions (used in admin Commission tab) ───────────
  const allTeamOverrides = useMemo(()=>{
    if (!isAdmin || teams.length===0) return [];
    return teams.map(t=>{
      let pool = invoices.filter(i=>(t.members||[]).includes(i.salesPerson));
      if (reportMonth) pool = pool.filter(i=>i.date&&i.date.slice(0,7)===reportMonth);
      const teamTotalCommission = calcTeamCommission(pool);
      const pct = num(t.overridePct)/100;
      return {
        teamName: t.name,
        managerName: t.managerName,
        teamTotalCommission,
        overridePct: pct,
        overrideAmt: teamTotalCommission*pct,
        memberCount: (t.members||[]).length,
      };
    }).filter(t=>t.teamTotalCommission>0 || t.memberCount>0);
  },[isAdmin, teams, invoices, reportMonth]);

  // ── Team CRUD (admin only) ───────────────────────────────────────────────────
  function resetTeamForm() {
    setTeamForm({name:"",managerName:"",overridePct:"5",members:[]});
    setEditingTeamId(null);
    setTeamMemberInput("");
    setShowTeamForm(false);
  }
  async function saveTeam() {
    if (!teamForm.name.trim()||!teamForm.managerName) { alert("Team name and manager are required."); return; }
    const data = { name:teamForm.name.trim(), managerName:teamForm.managerName, overridePct:num(teamForm.overridePct), members:teamForm.members };
    setSaving(true);
    try {
      if (editingTeamId) {
        await fsUpdate("teams", editingTeamId, data);
        setTeams(prev=>prev.map(t=>t.id===editingTeamId?{...data,id:editingTeamId}:t));
      } else {
        const id = await fsAdd("teams", data);
        setTeams(prev=>[...prev,{...data,id}]);
        // Promote manager user role to "manager"
        const mgr = users.find(u=>u.name===data.managerName);
        if (mgr && mgr.role==="sales") {
          await fsUpdate("users", mgr.username, {role:"manager"});
          setUsers(prev=>prev.map(u=>u.name===data.managerName?{...u,role:"manager"}:u));
        }
      }
      resetTeamForm();
      setShowTeamForm(false);
    } catch(e) { alert("Failed to save team: "+e.message); }
    setSaving(false);
  }
  async function deleteTeam(id) {
    if (!confirm("Delete this team?")) return;
    setSaving(true);
    try {
      const team = teams.find(t=>t.id===id);
      await fsDelete("teams", id);
      setTeams(prev=>prev.filter(t=>t.id!==id));
      // Demote manager back to sales if no other teams
      if (team) {
        const remaining = teams.filter(t=>t.id!==id&&t.managerName===team.managerName);
        if (remaining.length===0) {
          const mgr = users.find(u=>u.name===team.managerName);
          if (mgr && mgr.role==="manager") {
            await fsUpdate("users", mgr.username, {role:"sales"});
            setUsers(prev=>prev.map(u=>u.name===team.managerName?{...u,role:"sales"}:u));
          }
        }
      }
    } catch(e) { alert("Failed to delete team: "+e.message); }
    setSaving(false);
  }
  function startEditTeam(t) {
    setTeamForm({name:t.name,managerName:t.managerName,overridePct:String(t.overridePct||5),members:t.members||[]});
    setEditingTeamId(t.id);
    setShowTeamForm(true);
  }
  function addTeamMember() {
    const m = teamMemberInput.trim();
    if (!m||teamForm.members.includes(m)) return;
    setTeamForm(f=>({...f,members:[...f.members,m]}));
    setTeamMemberInput("");
  }
  function removeTeamMember(m) { setTeamForm(f=>({...f,members:f.members.filter(x=>x!==m)})); }

  // ── Analytics computed data ───────────────────────────────────────────────────
  const anaData = useMemo(()=>{
    let pool = isAdmin ? invoices
             : isManager ? invoices.filter(i=>managerScope.includes(i.salesPerson))
             : invoices.filter(i=>i.salesPerson===currentUser.name);
    if (anaMonth) pool = pool.filter(i=>i.date&&i.date.slice(0,7)===anaMonth);

    const bySP    = {}, byBranch = {};
    const swBySP  = {}, swByBranch = {};
    const newBySP = {}, newByBranch = {};
    const renBySP = {}, renByBranch = {};
    const productCount = {};
    let totalSales=0, totalSW=0, totalHW=0, totalNewSW=0, totalRenSW=0;

    pool.forEach(i=>{
      const sp = i.salesPerson||"Unknown";
      const br = i.branch||"Unknown";
      const hw = num(i.hardwareValue), sw = num(i.softwareValue);
      const tot = hw+sw;
      const isNew = num(i.newSub)>0;
      const isRen = num(i.renewal)>0 && !isNew;

      totalSales+=tot; totalSW+=sw; totalHW+=hw;
      if (isNew) totalNewSW+=sw;
      if (isRen) totalRenSW+=sw;

      bySP[sp]=(bySP[sp]||0)+tot;
      byBranch[br]=(byBranch[br]||0)+tot;
      swBySP[sp]=(swBySP[sp]||0)+sw;
      swByBranch[br]=(swByBranch[br]||0)+sw;
      if (isNew){ newBySP[sp]=(newBySP[sp]||0)+sw; newByBranch[br]=(newByBranch[br]||0)+sw; }
      if (isRen){ renBySP[sp]=(renBySP[sp]||0)+sw; renByBranch[br]=(renByBranch[br]||0)+sw; }

      // Product analysis from remark
      if (i.remark&&i.remark.trim()) {
        const key = i.remark.trim();
        if (!productCount[key]) productCount[key]={remark:key,count:0,totalValue:0,newSub:0,renewal:0};
        productCount[key].count++;
        productCount[key].totalValue+=tot;
        if (isNew) productCount[key].newSub++;
        if (isRen) productCount[key].renewal++;
      }
    });

    const toArr = obj=>Object.entries(obj).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
    const products = Object.values(productCount).sort((a,b)=>b.count-a.count);

    return {
      totalSales,totalSW,totalHW,totalNewSW,totalRenSW,
      invoiceCount:pool.length,
      bySP:toArr(bySP), byBranch:toArr(byBranch),
      swBySP:toArr(swBySP), swByBranch:toArr(swByBranch),
      newBySP:toArr(newBySP), newByBranch:toArr(newByBranch),
      renBySP:toArr(renBySP), renByBranch:toArr(renByBranch),
      products,
    };
  },[invoices, anaMonth, currentUser, isAdmin, isManager, managerScope]);

  // ── Analytics segment state (by person vs by branch toggle) ──────────────────
  const [anaSeg, setAnaSeg] = React.useState("person"); // "person"|"branch"

  // ── Render: not configured ────────────────────────────────────────────────────
  if (!IS_CONFIGURED) return h("div",{style:{maxWidth:680,margin:"2rem auto",padding:"0 1rem"}},
    h("div",{className:"config-banner"},
      h("h3",null,"⚙️ Firebase configuration required"),
      h("p",{style:{fontSize:13,color:"var(--text-2)",marginBottom:"1rem",lineHeight:1.7}},
        "Open ",h("code",null,"index.html")," in a text editor and replace the placeholder values in the ",
        h("code",null,"FIREBASE_CONFIG")," block near the top of the file with your actual Firebase project credentials. ",
        "See ",h("code",null,"SETUP.md")," for full step-by-step instructions."
      ),
      h("pre",{style:{background:"#fff",border:"1px solid var(--border)",borderRadius:6,padding:"1rem",fontSize:12,overflowX:"auto"}},
`const FIREBASE_CONFIG = {
  apiKey:            "AIzaSy...",
  authDomain:        "my-project.firebaseapp.com",
  projectId:         "my-project",
  storageBucket:     "my-project.appspot.com",
  messagingSenderId: "123456789",
  appId:             "1:123456789:web:abc123"
};`)
    )
  );

  // ── Render: loading ───────────────────────────────────────────────────────────
  if (appLoading) return h("div",{className:"loading-screen"},
    h("div",{className:"spinner"}),
    h("span",null,"Connecting to Firestore...")
  );

  // ── Render: Firebase error ────────────────────────────────────────────────────
  if (fbError) return h("div",{style:{maxWidth:560,margin:"2rem auto",padding:"0 1rem"}},
    h("div",{className:"config-banner"},
      h("h3",null,"Firebase Error"),
      h("p",{style:{fontSize:13}},fbError),
      h("p",{style:{fontSize:12,color:"var(--text-3)",marginTop:8}},"Check your Firebase config and Firestore security rules. See SETUP.md for help.")
    )
  );

  // ── Render: login ─────────────────────────────────────────────────────────────
  if (!currentUser) return h("div",{className:"login-wrap"},
    h("div",{className:"login-box"},
      h("h2",null,"Sales Commission Tracker"),
      h("p",{style:{color:"var(--text-2)",fontSize:13,marginBottom:"1.25rem"}},"Sign in to your account"),
      h("form",{onSubmit:handleLogin},
        h("div",{className:"form-group"},
          h("label",null,"Username"),
          h("input",{value:loginForm.username,autoFocus:true,disabled:loginLoading,onChange:e=>setLoginForm({...loginForm,username:e.target.value})})
        ),
        h("div",{className:"form-group"},
          h("label",null,"Password"),
          h("input",{type:"password",value:loginForm.password,disabled:loginLoading,onChange:e=>setLoginForm({...loginForm,password:e.target.value})})
        ),
        loginError&&h("p",{className:"err"},loginError),
        h("button",{type:"submit",className:"primary",disabled:loginLoading,style:{width:"100%",marginTop:8,padding:"9px"}},
          loginLoading?"Signing in...":"Sign in")
      ),
      h("div",{className:"hint-box"},
        h("strong",null,"Default credentials"),h("br"),
        "Admin: admin / admin123",h("br"),
        "Sales: firstname / firstname123",h("br"),
        h("em",{style:{color:"var(--text-3)"}},"e.g. levin / levin123")
      )
    )
  );

              h("p",{style:{fontSize:13,color:"var(--text-2)",lineHeight:1.6}},"Rate depends on how much new subscription value is achieved that month: > RM 20,000 \u2192 12%; > RM 14,000 \u2192 9%; > RM 8,000 \u2192 6%; otherwise base 3%.")
            ),
            h("div",{className:"calc-block"},
              h("div",{className:"calc-label"},"Per Invoice"),
              h("p",{style:{fontSize:13,color:"var(--text-2)",lineHeight:1.6}},"If New Subscription count > 0, full software value counts as new sub. If Renewal count > 0, full software value counts as renewal. A single invoice should not have both.")
            )
          )
        )
      ),

      /* ── SETTINGS ── */
      tab==="settings"&&isAdmin&&h("div",{className:"grid",style:{gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}},

        h("div",{className:"card"},
          h("h3",{style:{marginBottom:"1rem"}},"Sales Persons"),
          h("ul",{style:{listStyle:"none",padding:0,margin:"0 0 1rem"}},
            salesPeople.map(s=>h("li",{key:s,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
              h("span",{style:{fontSize:13}},s),
              h("button",{className:"icon delete-btn",disabled:saving,onClick:()=>removeSalesPerson(s)},"\u2715")
            ))
          ),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{placeholder:"New sales person name",value:newSalesName,onChange:e=>setNewSalesName(e.target.value)}),
            h("button",{className:"primary",disabled:saving,onClick:addSalesPerson},"Add")
          )
        ),

        h("div",{className:"card"},
          h("h3",{style:{marginBottom:"1rem"}},"User Accounts"),
          h("ul",{style:{listStyle:"none",padding:0,margin:"0 0 1rem"}},
            users.map(u=>h("li",{key:u.username||u.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}},
              h("div",null,
                h("span",{style:{fontSize:13,fontWeight:500}},u.username),
                h("span",{style:{fontSize:12,color:"var(--text-3)",marginLeft:6}},"("+u.role+") "+u.name),
                u.role==="manager"&&h("span",{className:"mgr-badge"},"Manager")
              ),
              u.username!=="admin"&&h("button",{className:"icon delete-btn",disabled:saving,onClick:()=>removeUser(u.username)},"\u2715")
            ))
          ),
          h("p",{style:{fontSize:12,color:"var(--text-2)",marginBottom:8}},"Add new sales person account:"),
          h("div",{style:{display:"grid",gap:8}},
            h("input",{placeholder:"Username",value:newUserForm.username,onChange:e=>setNewUserForm({...newUserForm,username:e.target.value})}),
            h("input",{placeholder:"Password",value:newUserForm.password,onChange:e=>setNewUserForm({...newUserForm,password:e.target.value})}),
            h("input",{placeholder:"Display name (must match sales person list)",value:newUserForm.name,onChange:e=>setNewUserForm({...newUserForm,name:e.target.value})}),
            h("button",{className:"primary",disabled:saving,onClick:addUser},"Add User")
          )
        ),

        h("div",{className:"card",style:{gridColumn:"1 / -1"}},
          h("div",{className:"team-head"},
            h("h3",{style:{margin:0}},"\uD83D\uDC65 Teams & Manager Override Commission"),
            !showTeamForm&&h("button",{className:"primary",onClick:()=>{resetTeamForm();setShowTeamForm(true);}},"+ New Team"),
            showTeamForm&&h("button",{onClick:resetTeamForm},"\u2715 Cancel")
          ),

          showTeamForm&&h("div",{style:{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:"1rem",marginBottom:"1rem"}},
            h("h4",{style:{marginBottom:12,fontSize:13}},(editingTeamId?"Edit":"Create")+" Team"),
            h("div",{className:"grid g2",style:{marginBottom:10}},
              h("div",null,
                h("label",null,"Team Name"),
                h("input",{value:teamForm.name,placeholder:"e.g. North Region",onChange:e=>setTeamForm({...teamForm,name:e.target.value})})
              ),
              h("div",null,
                h("label",null,"Manager (Sales Person)"),
                h("select",{value:teamForm.managerName,onChange:e=>setTeamForm({...teamForm,managerName:e.target.value})},
                  h("option",{value:""},"Select manager..."),
                  salesPeople.map(s=>h("option",{key:s,value:s},s))
                )
              ),
              h("div",null,
                h("label",null,"Override Commission % (of team total payout)"),
                h("input",{type:"number",min:"0",max:"100",step:"0.5",value:teamForm.overridePct,
                  onChange:e=>setTeamForm({...teamForm,overridePct:e.target.value})})
              )
            ),
            h("div",null,
              h("label",null,"Team Members (Sales Persons)"),
              h("div",{style:{display:"flex",gap:8,marginBottom:8}},
                h("select",{value:teamMemberInput,onChange:e=>setTeamMemberInput(e.target.value)},
                  h("option",{value:""},"Add member..."),
                  salesPeople.filter(s=>s!==teamForm.managerName&&!teamForm.members.includes(s))
                    .map(s=>h("option",{key:s,value:s},s))
                ),
                h("button",{className:"primary",onClick:addTeamMember,disabled:!teamMemberInput},"Add")
              ),
              teamForm.members.length>0&&h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}},
                teamForm.members.map(m=>h("span",{key:m,style:{display:"inline-flex",alignItems:"center",gap:4,background:"var(--primary-light)",color:"var(--primary)",borderRadius:999,padding:"3px 10px",fontSize:12,fontWeight:500}},
                  m,
                  h("button",{onClick:()=>removeTeamMember(m),style:{border:"none",background:"none",cursor:"pointer",color:"var(--primary)",padding:"0 2px",fontSize:14,lineHeight:1}},"\u00D7")
                ))
              )
            ),
            h("div",{style:{display:"flex",gap:8,marginTop:8}},
              h("button",{className:"primary",disabled:saving,onClick:saveTeam},saving?"Saving...":editingTeamId?"Save Changes":"Create Team"),
              h("button",{onClick:resetTeamForm},"Cancel")
            )
          ),

          teams.length===0
            ?h("p",{style:{color:"var(--text-3)",fontSize:13}},"No teams yet. Create one above.")
            :h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}},
              teams.map(t=>h("div",{key:t.id,className:"card team-card",style:{padding:"1rem"}},
                h("div",{className:"team-head"},
                  h("div",null,
                    h("div",{style:{fontWeight:600,fontSize:14}},t.name),
                    h("div",{style:{fontSize:12,color:"var(--text-2)",marginTop:2}},
                      h("span",{className:"team-badge"},"\uD83C\uDFC5 ",t.managerName),
                      h("span",{style:{marginLeft:8,color:"var(--text-3)"}},"Override: ",h("strong",null,t.overridePct+"%"))
                    )
                  ),
                  h("div",{style:{display:"flex",gap:4}},
                    h("button",{className:"icon edit-btn",onClick:()=>startEditTeam(t)},"\u270F"),
                    h("button",{className:"icon delete-btn",disabled:saving,onClick:()=>deleteTeam(t.id)},"\u2715")
                  )
                ),
                h("ul",{style:{listStyle:"none",padding:0,margin:0}},
                  (t.members||[]).length===0
                    ?h("li",{style:{fontSize:12,color:"var(--text-3)",padding:"6px 0"}},"No members yet.")
                    :(t.members||[]).map(m=>h("li",{key:m,className:"team-member-row"},
                      h("span",null,m),
                      h("span",{style:{fontSize:11,color:"var(--text-3)"}},"sales")
                    ))
                )
              ))
            )
        )
      ),

      /* ── MY TEAM (manager view) ── */
      tab==="myteam"&&isManager&&h("div",null,
        h("div",{className:"card",style:{marginBottom:"1.25rem",borderLeft:"4px solid var(--primary)"}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.75rem"}},
            h("h3",{style:{margin:0}},"\uD83D\uDC65 "+myTeam.name),
            h("span",{className:"team-badge"},"\uD83C\uDFC5 Manager: "+currentUser.name)
          ),
          h("div",{style:{fontSize:13,color:"var(--text-2)",marginBottom:4}},
            h("strong",null,"Override commission: "),myTeam.overridePct+"% of team total commission payout"
          ),
          h("div",{style:{fontSize:13,color:"var(--text-2)"}},"Team members: ",
            (myTeam.members||[]).join(", ")||h("em",null,"None assigned")
          )
        ),
        h("div",{className:"filter-row"},
          h("div",null,
            h("label",null,"Filter by Month"),
            h("input",{type:"month",value:reportMonth,onChange:e=>setReportMonth(e.target.value)})
          ),
          h("div",null,
            h("label",null,"Filter by Member"),
            h("select",{value:reportPerson,onChange:e=>setReportPerson(e.target.value)},
              h("option",{value:""},"All members"),
              myTeamMembers.map(s=>h("option",{key:s,value:s},s))
            )
          ),
          (reportMonth||reportPerson)&&h("div",{style:{alignSelf:"flex-end"}},
            h("button",{onClick:()=>{setReportMonth("");setReportPerson("");}},"Clear")
          )
        ),
        reportData.length===0
          ?h("div",{className:"card"},h("p",{className:"empty"},"No data for the selected period."))
          :reportData.map(r=>h("div",{key:r.name,className:"commission-card"},
            h("div",{className:"chead"},h("h3",null,r.name),h("span",{style:{fontSize:12,color:"var(--primary)"}},r.count+" invoice(s)")),
            h("div",{className:"commission-row"},
              h("div",{className:"rlabel"},
                h("div",null,"New subscription software value"),
                r.nTier
                  ?h("div",{style:{fontSize:11,color:"var(--text-3)"}},"Tier "+(NEWSUB_TIERS.indexOf(r.nTier)+1)+" ("+r.nTier.label+") \u2014 unlocks renewal at "+pctStr(r.rRateTier?r.rRateTier.pct:RENEWAL_BASE_PCT))
                  :h("div",{style:{fontSize:11,color:"var(--warn)"}},r.newSubSw>0?"Below RM 2,256 \u2014 no new sub commission; renewal at base 3%":"No new sub value \u2014 renewal at base 3%")
              ),
              h("span",{className:"rval"},fmt(r.newSubSw)),
              h("span",{className:"rpct"},pctStr(r.nPct)),
              h("span",{className:"rcomm"+(r.nComm===0?" zero":"")},fmt(r.nComm))
            ),
            h("div",{className:"commission-row"},
              h("div",{className:"rlabel"},
                h("div",null,"Renewal software value"),
                h("div",{style:{fontSize:11,color:r.rRateTier?"var(--text-3)":"var(--warn)"}},
                  r.rRateTier?"Rate unlocked: "+r.rRateTier.label+" \u2192 "+pctStr(r.rPct):"Base rate (3%) \u2014 new sub below RM 8,000")
              ),
              h("span",{className:"rval"},fmt(r.renewalSw)),
              h("span",{className:"rpct"},pctStr(r.rPct)),
              h("span",{className:"rcomm"+(r.rComm===0?" zero":"")},fmt(r.rComm))
            ),
            h("div",{className:"commission-total"},h("span",null,"Total Commission"),h("span",null,fmt(r.totalCommission)))
          )),
        managerOverride&&h("div",{className:"commission-card",style:{marginTop:8}},
          h("div",{className:"chead",style:{background:"#f0fdf4",borderColor:"#bbf7d0"}},
            h("h3",{style:{color:"var(--success)"}},"\uD83C\uDFC5 Your Override Commission"),
            h("span",{style:{fontSize:12,color:"var(--success)"}},myTeam.overridePct+"% of team payout")
          ),
          h("div",{className:"commission-row"},
            h("div",{className:"rlabel"},
              h("div",null,"Team total commission"),
              h("div",{style:{fontSize:11,color:"var(--text-3)"}},"Sum of all team members' commission this period")
            ),
            h("span",{className:"rval"},fmt(managerOverride.teamTotalCommission)),
            h("span",{className:"rpct"},pctStr(managerOverride.overridePct)),
            h("span",{className:"rcomm"},fmt(managerOverride.overrideAmt))
          ),
          h("div",{className:"commission-total",style:{background:"#f0fdf4"}},
            h("span",null,"Your override commission"),
            h("span",{style:{color:"var(--success)"}},fmt(managerOverride.overrideAmt))
          )
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
