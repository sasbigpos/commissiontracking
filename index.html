<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sales Commission Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
  --bg:#f5f6fa;--surface:#fff;--border:#e2e5ed;
  --primary:#2563eb;--pl:#eff4ff;
  --danger:#dc2626;--dl:#fef2f2;
  --warn:#d97706;--wl:#fffbeb;
  --success:#16a34a;
  --text:#111827;--t2:#4b5563;--t3:#9ca3af;
  --r:10px;--sh:0 1px 4px rgba(0,0,0,.07);
}
[data-theme="dark"]{
  --bg:#0f172a;--surface:#1e293b;--border:#334155;
  --pl:#1e3a5f;--dl:#3b1219;--wl:#3b2800;
  --text:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --sh:0 1px 4px rgba(0,0,0,.4);
}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;transition:background .2s,color .2s;}
h1,h2,h3,h4{margin:0 0 .5rem;}p{margin:0;}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;outline:none;transition:border-color .15s,background .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
input:disabled,select:disabled{background:var(--bg);color:var(--t2);}
label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:4px;}
textarea{resize:vertical;min-height:60px;}
button{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;transition:background .12s,border-color .12s;}
button:hover{background:var(--bg);}
button.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
button.primary:hover{background:#1d4ed8;}
button:disabled{opacity:.5;cursor:not-allowed;}
button.icon{padding:5px 8px;}
.eb{color:var(--primary);border-color:transparent;background:none;}.eb:hover{background:var(--pl);border-color:#c7d9fd;}
.db{color:var(--danger);border-color:transparent;background:none;}.db:hover{background:var(--dl);border-color:#fca5a5;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--sh);}
.g2{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
.g3{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:8px 10px;font-weight:600;font-size:12px;color:var(--t2);border-bottom:2px solid var(--border);white-space:nowrap;background:var(--bg);}
tbody td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.bg{background:#dcfce7;color:#15803d;}.by{background:#fef9c3;color:#a16207;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;}
.sc .sl{font-size:12px;color:var(--t2);margin-bottom:4px;}
.sc .sv{font-size:20px;font-weight:700;color:var(--text);}
.sc-blue{border-top:3px solid var(--primary);}.sc-blue .sl{color:var(--primary);font-weight:600;}.sv-blue{color:var(--primary)!important;}
.sc-green{border-top:3px solid var(--success);}.sc-green .sl{color:var(--success);font-weight:600;}.sv-green{color:var(--success)!important;}
.tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);border:none;background:none;transition:background .12s,color .12s;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.active{background:var(--primary);color:#fff;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.topbar h1{font-size:16px;font-weight:700;}
.main{max-width:1500px;margin:0 auto;padding:1.25rem 1.5rem;}
.frow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;}
.frow>div{min-width:140px;}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh);}
.chead{background:var(--pl);border-bottom:1px solid #c7d9fd;padding:.85rem 1.25rem;display:flex;justify-content:space-between;align-items:center;}
.chead h3{font-size:15px;color:var(--primary);margin:0;}
.crow{display:flex;gap:12px;align-items:center;padding:10px 1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.rl{flex:1;min-width:200px;color:var(--t2);font-size:13px;}
.rv{font-size:13px;min-width:120px;text-align:right;}
.rp{font-size:12px;min-width:44px;text-align:center;background:var(--bg);border-radius:4px;padding:2px 6px;color:var(--t2);border:1px solid var(--border);}
.rc{font-size:14px;font-weight:600;min-width:120px;text-align:right;color:var(--success);}
.rc.z{color:var(--t3);}
.ctot{display:flex;justify-content:space-between;align-items:center;padding:12px 1.25rem;background:var(--bg);border-top:2px solid var(--border);}
.ctot span:last-child{font-size:18px;font-weight:700;color:var(--primary);}
.tpay{display:flex;justify-content:space-between;align-items:center;border-radius:var(--r);padding:1rem 1.25rem;font-weight:600;font-size:15px;margin-top:8px;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--bg);}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.hint-box{font-size:12px;color:var(--t3);background:var(--bg);border-radius:6px;padding:10px;margin-top:1rem;}
.err{color:var(--danger);font-size:12px;margin-top:6px;padding:8px 10px;background:var(--dl);border-radius:6px;}
.pill{display:inline-block;border-radius:999px;padding:1px 10px;font-size:11px;font-weight:600;}
.pill-g{background:var(--bg);color:var(--t2);border:1px solid var(--border);}
.tnote{font-size:12px;color:var(--t2);margin-top:10px;}
.tnote-ok{color:var(--success);}
.tc-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:1rem;}
.ti{width:38px;height:38px;min-width:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.ti-b{background:var(--pl);}.ti-g{background:#dcfce7;}
.tt{table-layout:fixed;width:100%;}
.tt td,.tt th{word-break:break-word;overflow-wrap:break-word;}
.tt td:last-child,.tt th:last-child{width:70px;}
.tt thead th{background:transparent;border-bottom:1px solid var(--border);}
.tn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--bg);font-weight:600;font-size:12px;color:var(--t2);}
.rb{display:inline-block;padding:3px 8px;border-radius:6px;font-weight:700;font-size:12px;white-space:nowrap;}
.rb1{background:#dbeafe;color:#1d4ed8;}.rb2{background:#bfdbfe;color:#1e40af;}.rb3{background:#93c5fd;color:#1e3a8a;}
.rg1{background:#dcfce7;color:#15803d;}.rg2{background:#bbf7d0;color:#166534;}.rg3{background:#86efac;color:#14532d;}
.rgr{background:var(--bg);color:var(--t2);border:1px solid var(--border);}
.cb{background:var(--surface);border:1px solid #c7d9fd;border-radius:8px;padding:12px 14px;}
.cl{font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.team-card{border-left:4px solid var(--primary);}
.team-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px;}
.team-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:var(--pl);color:var(--primary);padding:3px 8px;border-radius:999px;}
.tmr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.tmr:last-child{border-bottom:none;}
.mgr-b{font-size:11px;background:#fef9c3;color:#a16207;border:1px solid #fde68a;padding:2px 7px;border-radius:999px;font-weight:600;margin-left:6px;}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--t2);font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.cfg{background:var(--wl);border:1px solid #fcd34d;border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem;}
.cfg h3{color:var(--warn);margin-bottom:8px;}
.sync{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:4px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--success);}
.dot.saving{background:var(--warn);animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* User management */
.um-table{width:100%;border-collapse:collapse;}
.um-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);border-bottom:1px solid var(--border);}
.um-table td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.um-table tr:last-child td{border-bottom:none;}
.um-table tr:hover td{background:var(--bg);}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;}
.role-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;}
.rb-admin{background:#eff4ff;color:#2563eb;border:1px solid #c7d9fd;}
.rb-sales{background:var(--bg);color:var(--t2);border:1px solid var(--border);}
.rb-mgr{background:#fef9c3;color:#a16207;border:1px solid #fde68a;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;}
.um-you{font-size:11px;color:var(--primary);font-weight:600;}
.theme-btn{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--t2);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:5px;}
.theme-btn:hover{background:var(--bg);}
/* Analytics */
.agrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:20px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--sh);}
.chart-card h4{margin:0 0 4px;font-size:14px;font-weight:600;}
.chart-sub{font-size:12px;color:var(--t3);margin-bottom:14px;}
.seg{display:flex;gap:4px;background:var(--bg);border-radius:6px;padding:3px;margin-bottom:12px;width:fit-content;}
.seg-b{padding:5px 12px;border-radius:4px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:none;color:var(--t2);}
.seg-b.on{background:var(--surface);color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.pt{width:100%;border-collapse:collapse;font-size:12px;}
.pt th{text-align:left;padding:6px 8px;font-weight:600;color:var(--t2);border-bottom:2px solid var(--border);background:var(--bg);}
.pt td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
.pt tr:last-child td{border-bottom:none;}
.pt tr:hover td{background:var(--bg);}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.kc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;text-align:center;}
.kc .kv{font-size:22px;font-weight:700;}
.kc .kl{font-size:11px;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.k1{border-top:3px solid var(--primary);}.k1 .kv{color:var(--primary);}
.k2{border-top:3px solid var(--success);}.k2 .kv{color:var(--success);}
.k3{border-top:3px solid #d97706;}.k3 .kv{color:#d97706;}
.k4{border-top:3px solid #7c3aed;}.k4 .kv{color:#7c3aed;}
.k5{border-top:3px solid #db2777;}.k5 .kv{color:#db2777;}
.k6{border-top:3px solid #0891b2;}.k6 .kv{color:#0891b2;}
.br{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;}
.br .bl{min-width:90px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2);}
.br .bt{flex:1;height:14px;background:var(--bg);border-radius:4px;overflow:hidden;}
.br .bf{height:100%;border-radius:4px;}
.br .bv{min-width:78px;text-align:right;font-size:11px;color:var(--t2);}
@media(max-width:600px){.topbar{padding:.75rem 1rem;}.main{padding:1rem;}.tab{padding:6px 10px;font-size:12px;}}
</style>
</head>
<body>
<div id="root"></div>
<script>

// ── Firebase config ───────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyC1IUIIKGr9x5GEh6AuQPrV_4VroE6VbyU",
  authDomain:        "commissiontracking-1ac0a.firebaseapp.com",
  projectId:         "commissiontracking-1ac0a",
  storageBucket:     "commissiontracking-1ac0a.firebasestorage.app",
  messagingSenderId: "306865619840",
  appId:             "1:306865619840:web:0c235bda808782394f7765"
};
const IS_CONFIGURED = !FIREBASE_CONFIG.apiKey.startsWith("YOUR_");
const { createElement:h, useState, useEffect, useMemo, useRef } = React;

// ── Constants ─────────────────────────────────────────────────────────────────
const BRANCHES = ["HQ","SWK","JHR","SBH","KL","PG","PHG"];
const DEFAULT_SALES = ["Melvilline","Levin","Azfar","Jaery","Zani","Hong","Allan"];
const NEWSUB_TIERS = [
  { min:2256,     max:11280,    pct:0.08, label:"RM 2,256 - RM 11,280" },
  { min:11281,    max:20304,    pct:0.12, label:"RM 11,281 - RM 20,304" },
  { min:20304.01, max:Infinity, pct:0.18, label:"> RM 20,304" },
];
const RENEWAL_RATE_TIERS = [
  { minNewSub:20000.01, pct:0.12, label:"> RM 20,000 new sub" },
  { minNewSub:14000.01, pct:0.09, label:"> RM 14,000 new sub" },
  { minNewSub:8000.01,  pct:0.06, label:"> RM 8,000 new sub"  },
];
const RENEWAL_BASE_PCT = 0.03;
const PIE_COLORS = ["#2563eb","#16a34a","#d97706","#7c3aed","#db2777","#0891b2","#65a30d","#ea580c","#4f46e5","#0d9488","#b45309","#6d28d9","#be123c","#0369a1","#15803d","#c2410c"];
const DEFAULT_USERS = [
  { username:"admin", password:"admin123", role:"admin", name:"Admin" },
  ...DEFAULT_SALES.map(n=>({ username:n.toLowerCase(), password:n.toLowerCase()+"123", role:"sales", name:n }))
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function getRenewalRate(v){ for(const t of RENEWAL_RATE_TIERS) if(v>=t.minNewSub) return t; return null; }
function getTier(v,tiers){ for(const t of tiers) if(v>=t.min&&v<=t.max) return t; return null; }
function fmt(n){ return "RM"+(Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function pct(n){ return (n*100).toFixed(0)+"%"; }
function num(v){ return Number(v)||0; }
function emptyInv(){ return {date:"",invoiceNo:"",customer:"",hardwareValue:"",softwareValue:"",softwareCase:"",newSub:"0",renewal:"0",branch:BRANCHES[0],salesPerson:"",status:"Paid",remark:""}; }
function calcTeamComm(pool){
  const byP={};
  pool.forEach(i=>{ const sp=i.salesPerson||"?"; if(!byP[sp]) byP[sp]={r:0,n:0};
    const sw=num(i.softwareValue);
    if(num(i.newSub)>0) byP[sp].n+=sw; else if(num(i.renewal)>0) byP[sp].r+=sw;
  });
  let tot=0;
  Object.values(byP).forEach(d=>{ const np=(getTier(d.n,NEWSUB_TIERS)||{pct:0}).pct; const rp=(getRenewalRate(d.n)||{pct:RENEWAL_BASE_PCT}).pct; tot+=d.n*np+d.r*rp; });
  return tot;
}

// ── Firestore ─────────────────────────────────────────────────────────────────
let db=null;
function initFB(){ try{ if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG); db=firebase.firestore(); return true; }catch(e){ return false; } }
async function fsAll(col){ const s=await db.collection(col).get(); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function fsSet(col,id,data){ await db.collection(col).doc(id).set(data); }
async function fsAdd(col,data){ const r=await db.collection(col).add(data); return r.id; }
async function fsUpd(col,id,data){ await db.collection(col).doc(id).update(data); }
async function fsDel(col,id){ await db.collection(col).doc(id).delete(); }

// ── SVG Pie chart (no external deps) ─────────────────────────────────────────
function arc(cx,cy,r,a0,a1){
  const s={x:cx+r*Math.cos(a0),y:cy+r*Math.sin(a0)};
  const e={x:cx+r*Math.cos(a1),y:cy+r*Math.sin(a1)};
  return "M "+cx+" "+cy+" L "+s.x+" "+s.y+" A "+r+" "+r+" 0 "+(a1-a0>Math.PI?1:0)+" 1 "+e.x+" "+e.y+" Z";
}
function PieChart({data,title,subtitle}){
  const [tip,setTip]=useState(null);
  if(!data||data.length===0) return h("div",{className:"chart-card"},h("h4",null,title),h("div",{className:"chart-sub"},subtitle),h("p",{style:{color:"var(--t3)",fontSize:12,padding:"2rem 0",textAlign:"center"}},"No data"));
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0) return h("div",{className:"chart-card"},h("h4",null,title),h("div",{className:"chart-sub"},subtitle),h("p",{style:{color:"var(--t3)",fontSize:12,padding:"2rem 0",textAlign:"center"}},"All values zero"));
  let a=-Math.PI/2;
  const slices=data.map((d,i)=>{ const sw=(d.value/total)*2*Math.PI; const s={path:arc(120,120,100,a,a+sw),color:PIE_COLORS[i%PIE_COLORS.length],label:d.label,value:d.value,pct:(d.value/total*100).toFixed(1),i}; a+=sw; return s; });
  return h("div",{className:"chart-card"},
    h("h4",null,title),h("div",{className:"chart-sub"},subtitle),
    h("div",{style:{display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-start"}},
      h("div",{style:{position:"relative",flexShrink:0}},
        h("svg",{width:240,height:240,viewBox:"0 0 240 240"},
          slices.map(s=>h("path",{key:s.i,d:s.path,fill:s.color,stroke:"#fff",strokeWidth:2,style:{cursor:"pointer",opacity:tip&&tip.i===s.i?.75:1},onMouseEnter:()=>setTip(s),onMouseLeave:()=>setTip(null)}))
        ),
        tip&&h("div",{style:{position:"absolute",top:4,left:248,background:"#1f2937",color:"#fff",borderRadius:6,padding:"8px 10px",fontSize:11,pointerEvents:"none",minWidth:130,zIndex:10,boxShadow:"0 2px 8px rgba(0,0,0,.3)"}},
          h("div",{style:{fontWeight:600,marginBottom:2}},tip.label),
          h("div",null,fmt(tip.value)),
          h("div",{style:{color:"#9ca3af"}},tip.pct+"%")
        )
      ),
      h("div",{style:{flex:1,minWidth:100,maxHeight:240,overflowY:"auto"}},
        slices.map(s=>h("div",{key:s.i,style:{display:"flex",alignItems:"center",gap:6,marginBottom:5,fontSize:11,cursor:"pointer",opacity:tip&&tip.i===s.i?.7:1},onMouseEnter:()=>setTip(s),onMouseLeave:()=>setTip(null)},
          h("div",{style:{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}),
          h("span",{style:{color:"var(--t2)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},s.label),
          h("span",{style:{color:"var(--t3)",flexShrink:0}},s.pct+"%")
        ))
      )
    )
  );
}
function HBar({data,color}){
  if(!data||data.length===0) return h("p",{style:{color:"var(--t3)",fontSize:12}},"No data");
  const max=Math.max(...data.map(d=>d.value),1);
  return h("div",null,data.map((d,i)=>h("div",{key:d.label,className:"br"},
    h("span",{className:"bl",title:d.label},d.label),
    h("div",{className:"bt"},h("div",{className:"bf",style:{width:(d.value/max*100)+"%",background:color||PIE_COLORS[i%PIE_COLORS.length]}})),
    h("span",{className:"bv"},fmt(d.value))
  )));
}

// ── Export helpers ───────────────────────────────────────────────────────────
function exportCommissionCSV(repData, allOverrides, mgrOverride, rMonth, isAdmin, isManager) {
  const period = rMonth || "All periods";
  const rows = [];
  rows.push(["Sales Commission Report"]);
  rows.push(["Period:", period]);
  rows.push(["Generated:", new Date().toLocaleString()]);
  rows.push([]);
  rows.push(["Sales Person", "New Sub SW Value", "New Sub Rate", "New Sub Commission", "Renewal SW Value", "Renewal Rate", "Renewal Commission", "Total Commission"]);
  repData.forEach(r => {
    rows.push([
      r.name,
      r.nSw.toFixed(2),
      (r.np*100).toFixed(0)+"%",
      r.nc.toFixed(2),
      r.rSw.toFixed(2),
      (r.rp*100).toFixed(0)+"%",
      r.rc.toFixed(2),
      r.total.toFixed(2)
    ]);
  });
  if (repData.length > 0) {
    const totNC = repData.reduce((s,r)=>s+r.nc,0);
    const totRC = repData.reduce((s,r)=>s+r.rc,0);
    const totComm = repData.reduce((s,r)=>s+r.total,0);
    rows.push(["TOTAL","","",""+totNC.toFixed(2),"","",""+totRC.toFixed(2),""+totComm.toFixed(2)]);
  }
  if (isAdmin && allOverrides && allOverrides.length > 0) {
    rows.push([]);
    rows.push(["Manager Override Commissions"]);
    rows.push(["Team", "Manager", "Team Total Commission", "Override %", "Override Commission"]);
    allOverrides.forEach(t => {
      rows.push([t.teamName, t.mgr, t.tc.toFixed(2), (t.p*100).toFixed(0)+"%", t.amt.toFixed(2)]);
    });
    if (allOverrides.length > 1) {
      rows.push(["TOTAL OVERRIDE","","","",allOverrides.reduce((s,t)=>s+t.amt,0).toFixed(2)]);
    }
  }
  if (isManager && mgrOverride) {
    rows.push([]);
    rows.push(["Manager Override Commission"]);
    rows.push(["Team", "Team Total Commission", "Override %", "Override Commission"]);
    rows.push([mgrOverride.teamName, mgrOverride.tc.toFixed(2), (mgrOverride.p*100).toFixed(0)+"%", mgrOverride.amt.toFixed(2)]);
  }
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "commission_report_"+(rMonth||"all")+".csv"; a.click();
  URL.revokeObjectURL(url);
}

    @media print{body{padding:12px;}@page{margin:1cm;}}
  </style></head><body>`;

  html += `<h1>Sales Commission Report</h1>
  <div class="meta">Period: ${period} &nbsp;|&nbsp; Generated: ${now}</div>`;

  repData.forEach(r => {
    const tier = NEWSUB_TIERS.indexOf(r.nt);
    html += `<div class="person-card">
      <div class="person-head"><h2>${r.name}</h2><span>${r.cnt} invoice(s)</span></div>
      <div class="row">
        <div class="rl">New subscription software value<div class="sub">${r.nt?"Tier "+(tier+1)+" ("+r.nt.label+")":r.nSw>0?"Below RM 2,256 - no commission":"No new sub value"}</div></div>
        <div class="rv">${fmtN(r.nSw)}</div>

        <div class="rc ${r.nc===0?"z":""}">${fmtN(r.nc)}</div>
      </div>
      <div class="row">
        <div class="rl">Renewal software value<div class="sub">${r.rrt?"Rate unlocked: "+r.rrt.label:"Base rate (3%) - new sub below RM 8,000"}</div></div>
        <div class="rv">${fmtN(r.rSw)}</div>
        <div class="rp">${pctN(r.rp)}</div>
        <div class="rc ${r.rc===0?"z":""}">${fmtN(r.rc)}</div>
      </div>
      <div class="tot"><span>Total Commission</span><span class="val">${fmtN(r.total)}</span></div>
    </div>`;
  });

  if (repData.length > 1) {
    const totComm = repData.reduce((s,r)=>s+r.total,0);
    html += `<div class="grand"><span>Total Payout - All Sales Persons</span><span>${fmtN(totComm)}</span></div>`;

  if (isAdmin && allOverrides && allOverrides.length > 0) {

  if (isManager && mgrOverride) {

        <div class="rp">${pctN(mgrOverride.p)}</div>
        <div class="rc">${fmtN(mgrOverride.amt)}</div>
      </div>
      <div class="mgr-tot"><span>Your override commission</span><span class="val">${fmtN(mgrOverride.amt)}</span></div>
    </div></div>`;
  }

  html += `</body></html>`;

  const w = window.open("","_blank","width=900,height=700");
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(()=>{ w.print(); }, 500);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [fbError,  setFbError]  = useState("");
  const [darkMode, setDarkMode] = useState(()=>{ try{ return localStorage.getItem("theme")==="dark"; }catch(e){ return false; } });
  const [loading,  setLoading]  = useState(true);
  const [saving,   setSaving]   = useState(false);
  const [users,    setUsers]    = useState([]);
  const [invoices, setInvoices] = useState([]);
  const [salesPpl, setSalesPpl] = useState(DEFAULT_SALES);
  const [teams,    setTeams]    = useState([]);
  const [me,       setMe]       = useState(null);
  const [loginF,   setLoginF]   = useState({u:"",p:""});
  const [loginErr, setLoginErr] = useState("");
  const [loginBusy,setLoginBusy]= useState(false);
  const [tab,      setTab]      = useState("invoices");
  const [form,     setForm]     = useState(emptyInv());
  const [editId,   setEditId]   = useState(null);
  const [fMonth,   setFMonth]   = useState("");
  const [fPerson,  setFPerson]  = useState("");
  const [rMonth,   setRMonth]   = useState("");
  const [rPerson,  setRPerson]  = useState("");
  const [aMonth,   setAMonth]   = useState("");
  const [aSeg,     setASeg]     = useState("person");
  const [newSales, setNewSales] = useState("");
  const [newUF,    setNewUF]    = useState({u:"",p:"",n:"",role:"sales",_show:false});
  const [teamF,    setTeamF]    = useState({name:"",mgr:"",pct:"5",members:[]});
  const [editTeam, setEditTeam] = useState(null);
  const [showTF,   setShowTF]   = useState(false);
  const [tmInp,    setTmInp]    = useState("");

  // ── Init ──────────────────────────────────────────────────────────────────
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme", darkMode?"dark":"light");
    try{ localStorage.setItem("theme", darkMode?"dark":"light"); }catch(e){}
  },[darkMode]);

  useEffect(()=>{
    if(!IS_CONFIGURED){ setLoading(false); return; }
    if(!initFB()){ setFbError("Firebase init failed. Check config."); setLoading(false); return; }
    (async()=>{
      try{
        let usersData=await fsAll("users");
        if(usersData.length===0){ for(const x of DEFAULT_USERS) await fsSet("users",x.username,x); usersData=DEFAULT_USERS.map(x=>({...x,id:x.username})); }
        setUsers(usersData);
        setInvoices(await fsAll("invoices"));
        const teamsData = await fsAll("teams");
        setTeams(teamsData);
        const mgrNames = teamsData.map(t=>t.managerName);
        for (const u of usersData) {
          const shouldBeMgr = mgrNames.includes(u.name);
          if (shouldBeMgr && u.role === "sales") {
            await fsUpd("users", u.username, {role:"manager"});
            u.role = "manager";
          } else if (!shouldBeMgr && u.role === "manager") {
            await fsUpd("users", u.username, {role:"sales"});
            u.role = "sales";
          }
        }
        try{ const s=await db.collection("settings").doc("salesPeople").get(); if(s.exists) setSalesPpl(s.data().list||DEFAULT_SALES); else await db.collection("settings").doc("salesPeople").set({list:DEFAULT_SALES}); }catch(e){}
      }catch(e){ setFbError("Firestore error: "+e.message); }
      setLoading(false);
    })();
  },[]);

  const isAdmin   = me&&me.role==="admin";
  const isManager = me&&me.role==="manager";
  const myTeam    = useMemo(()=>teams.find(t=>t.managerName===me?.name)||null,[teams,me]);
  const myMembers = useMemo(()=>myTeam?(myTeam.members||[]):[],[myTeam]);
  const myScope   = useMemo(()=>isManager&&me?[me.name,...myMembers]:[],[isManager,me,myMembers]);

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function login(e){
    e.preventDefault(); setLoginBusy(true); setLoginErr("");
    try{
      const s=await db.collection("users").doc(loginF.u.trim().toLowerCase()).get();
      if(!s.exists||s.data().password!==loginF.p){ setLoginErr("Invalid username or password."); setLoginBusy(false); return; }
      const u=s.data(); setMe(u);
      if(u.role!=="admin"){ setForm(f=>({...f,salesPerson:u.name})); setRPerson(u.name); }
    }catch(e){ setLoginErr("Login error: "+e.message); }
    setLoginBusy(false);
  }
  function logout(){ setMe(null); setLoginF({u:"",p:""}); setTab("invoices"); }

  // ── Derived invoice lists ─────────────────────────────────────────────────
  const visible=useMemo(()=>{
    if(!me) return [];
    if(isAdmin) return invoices;
    if(isManager) return invoices.filter(i=>myScope.includes(i.salesPerson));
    return invoices.filter(i=>i.salesPerson===me.name);
  },[invoices,me,isAdmin,isManager,myScope]);

  const filtered=useMemo(()=>visible.filter(i=>{
    if(fMonth&&i.date&&i.date.slice(0,7)!==fMonth) return false;
    if((isAdmin||isManager)&&fPerson&&i.salesPerson!==fPerson) return false;
    return true;
  }),[visible,fMonth,fPerson,isAdmin,isManager]);

  const totals=useMemo(()=>filtered.reduce((a,i)=>{
    const sw=num(i.softwareValue),hw=num(i.hardwareValue);
    const isN=num(i.newSub)>0, isR=num(i.renewal)>0&&!isN;
    return{hw:a.hw+hw,sw:a.sw+sw,tot:a.tot+hw+sw,cases:a.cases+num(i.softwareCase),nSw:a.nSw+(isN?sw:0),rSw:a.rSw+(isR?sw:0)};
  },{hw:0,sw:0,tot:0,cases:0,nSw:0,rSw:0}),[filtered]);

  // ── Commission report data ────────────────────────────────────────────────
  const repData=useMemo(()=>{
    if(!me) return [];
    let pool=invoices;
    if(isAdmin){ if(rPerson) pool=pool.filter(i=>i.salesPerson===rPerson); }
    else if(isManager){ pool=pool.filter(i=>myMembers.includes(i.salesPerson)); if(rPerson) pool=pool.filter(i=>i.salesPerson===rPerson); }
    else pool=pool.filter(i=>i.salesPerson===me.name);
    if(rMonth) pool=pool.filter(i=>i.date&&i.date.slice(0,7)===rMonth);
    const byP={};
    pool.forEach(i=>{ const sp=i.salesPerson||"?"; if(!byP[sp]) byP[sp]={rSw:0,nSw:0,cnt:0};
      const sw=num(i.softwareValue);
      if(num(i.newSub)>0) byP[sp].nSw+=sw; else if(num(i.renewal)>0) byP[sp].rSw+=sw;
      byP[sp].cnt++;
    });
    return Object.entries(byP).map(([name,d])=>{
      const nt=getTier(d.nSw,NEWSUB_TIERS),np=nt?nt.pct:0,nc=d.nSw*np;
      const rrt=getRenewalRate(d.nSw),rp=rrt?rrt.pct:RENEWAL_BASE_PCT,rc=d.rSw*rp;
      return{name,...d,nt,np,nc,rrt,rp,rc,total:nc+rc};
    }).sort((a,b)=>a.name.localeCompare(b.name));
  },[invoices,me,isAdmin,isManager,myMembers,rMonth,rPerson]);

  const mgrOverride=useMemo(()=>{
    if(!isManager||!myTeam) return null;
    let pool=invoices.filter(i=>myMembers.includes(i.salesPerson));
    if(rMonth) pool=pool.filter(i=>i.date&&i.date.slice(0,7)===rMonth);
    const tc=calcTeamComm(pool),p=num(myTeam.overridePct)/100;
    return{teamName:myTeam.name,tc,p,amt:tc*p};
  },[isManager,myTeam,myMembers,invoices,rMonth]);

  const allOverrides=useMemo(()=>{
    if(!isAdmin||teams.length===0) return [];
    return teams.map(t=>{
      let pool=invoices.filter(i=>(t.members||[]).includes(i.salesPerson));
      if(rMonth) pool=pool.filter(i=>i.date&&i.date.slice(0,7)===rMonth);
      const tc=calcTeamComm(pool),p=num(t.overridePct)/100;
      return{teamName:t.name,mgr:t.managerName,tc,p,amt:tc*p,mc:(t.members||[]).length};
    });
  },[isAdmin,teams,invoices,rMonth]);

  // ── Invoice CRUD ──────────────────────────────────────────────────────────
  function resetForm(){ setForm({...emptyInv(),salesPerson:(me&&me.role!=="admin")?me.name:""}); setEditId(null); }
  async function saveInv(e){
    e.preventDefault();
    if(!form.date||!form.invoiceNo||!form.customer||!form.salesPerson){ alert("Fill Date, Invoice No, Customer, Sales Person."); return; }
    const d={...form,hardwareValue:num(form.hardwareValue),softwareValue:num(form.softwareValue),softwareCase:num(form.softwareCase),newSub:num(form.newSub),renewal:num(form.renewal),updatedAt:new Date().toISOString()};
    setSaving(true);
    try{
      if(editId){ await fsUpd("invoices",editId,d); setInvoices(p=>p.map(i=>i.id===editId?{...d,id:editId}:i)); }
      else{ d.createdAt=new Date().toISOString(); const id=await fsAdd("invoices",d); setInvoices(p=>[...p,{...d,id}]); }
      resetForm();
    }catch(err){ alert("Save failed: "+err.message); }
    setSaving(false);
  }
  async function delInv(id){ if(!confirm("Delete this invoice?")) return; setSaving(true); try{ await fsDel("invoices",id); setInvoices(p=>p.filter(i=>i.id!==id)); if(editId===id) resetForm(); }catch(e){ alert("Delete failed: "+e.message); } setSaving(false); }

  // ── Settings helpers ──────────────────────────────────────────────────────
  async function saveSP(next){ setSalesPpl(next); try{ await db.collection("settings").doc("salesPeople").set({list:next}); }catch(e){} }
  async function addUser(){
    if(!newUF.u.trim()||!newUF.p.trim()||!newUF.n.trim()){ alert("Fill all fields."); return; }
    const un=newUF.u.trim().toLowerCase();
    if(users.some(u=>u.username.toLowerCase()===un)){ alert("Username exists."); return; }
    const u={username:un,password:newUF.p.trim(),role:newUF.role||"sales",name:newUF.n.trim()};
    setSaving(true);
    try{ await fsSet("users",un,u); setUsers(p=>[...p,{...u,id:un}]); if(!salesPpl.includes(u.name)) await saveSP([...salesPpl,u.name]); setNewUF({u:"",p:"",n:"",role:"sales",_show:false}); }catch(e){ alert("Failed: "+e.message); }
    setSaving(false);
  }
  async function delUser(un){ if(!confirm("Remove user "+un+"?")) return; setSaving(true); try{ await fsDel("users",un); setUsers(p=>p.filter(u=>u.username!==un)); }catch(e){ alert(e.message); } setSaving(false); }

  function resetTF(){ setTeamF({name:"",mgr:"",pct:"5",members:[]}); setEditTeam(null); setShowTF(false); setTmInp(""); }
  async function saveTeam(){
    if(!teamF.name.trim()||!teamF.mgr){ alert("Team name and manager required."); return; }
    const d={name:teamF.name.trim(),managerName:teamF.mgr,overridePct:num(teamF.pct),members:teamF.members};
    setSaving(true);
    try{
      if(editTeam){ await fsUpd("teams",editTeam,d); setTeams(p=>p.map(t=>t.id===editTeam?{...d,id:editTeam}:t)); }
      else{
        const id=await fsAdd("teams",d); setTeams(p=>[...p,{...d,id}]);
        const mu=users.find(u=>u.name===d.managerName);
        if(mu&&mu.role==="sales"){ await fsUpd("users",mu.username,{role:"manager"}); setUsers(p=>p.map(u=>u.name===d.managerName?{...u,role:"manager"}:u)); }
      }
      resetTF();
    }catch(e){ alert("Failed: "+e.message); }
    setSaving(false);
  }
  async function delTeam(id){
    if(!confirm("Delete this team?")) return; setSaving(true);
    try{
      const t=teams.find(x=>x.id===id); await fsDel("teams",id); setTeams(p=>p.filter(x=>x.id!==id));
      if(t&&teams.filter(x=>x.id!==id&&x.managerName===t.managerName).length===0){
        const mu=users.find(u=>u.name===t.managerName);
        if(mu&&mu.role==="manager"){ await fsUpd("users",mu.username,{role:"sales"}); setUsers(p=>p.map(u=>u.name===t.managerName?{...u,role:"sales"}:u)); }
      }
    }catch(e){ alert(e.message); }
    setSaving(false);
  }

  // ── Analytics data ────────────────────────────────────────────────────────
  const ana=useMemo(()=>{
    let pool=isAdmin?invoices:isManager?invoices.filter(i=>myScope.includes(i.salesPerson)):invoices.filter(i=>i.salesPerson===me?.name);
    if(aMonth) pool=pool.filter(i=>i.date&&i.date.slice(0,7)===aMonth);
    const bySP={},byBr={},swSP={},swBr={},nSP={},nBr={},rSP={},rBr={},prods={};
    let tS=0,tSW=0,tHW=0,tNSW=0,tRSW=0;
    pool.forEach(i=>{
      const sp=i.salesPerson||"?",br=i.branch||"?",hw=num(i.hardwareValue),sw=num(i.softwareValue),tot=hw+sw;
      const isN=num(i.newSub)>0,isR=num(i.renewal)>0&&!isN;
      tS+=tot;tSW+=sw;tHW+=hw;if(isN)tNSW+=sw;if(isR)tRSW+=sw;
      bySP[sp]=(bySP[sp]||0)+tot; byBr[br]=(byBr[br]||0)+tot;
      swSP[sp]=(swSP[sp]||0)+sw;  swBr[br]=(swBr[br]||0)+sw;
      if(isN){nSP[sp]=(nSP[sp]||0)+sw;nBr[br]=(nBr[br]||0)+sw;}
      if(isR){rSP[sp]=(rSP[sp]||0)+sw;rBr[br]=(rBr[br]||0)+sw;}
      if(i.remark&&i.remark.trim()){
        // Split remark by comma to extract individual products
        const items=i.remark.split(",").map(s=>s.trim()).filter(s=>s.length>0);
